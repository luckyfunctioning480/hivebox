# HiveBox docker-compose configuration.
#
# Usage:
#   docker compose up -d          # Start HiveBox daemon
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop and clean up
#
# The API is available at http://localhost:7070

services:
  hivebox:
    build: .
    privileged: true
    cgroup_parent: ""
    cgroup: host
    ports:
      - "7070:7070"
    environment:
      - HIVEBOX_API_KEY=${HIVEBOX_API_KEY:-}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      # Persist sandbox images across restarts.
      - hivebox-images:/var/lib/hivebox/images
      # cgroup v2 filesystem (required for resource limits).
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7070/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  hivebox-images:
