<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HiveBox Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-background-color: #0d1117;
      --base-color: #c9d1d9;
      --theme-color: #f0b429;
      --sidebar-background: #161b22;
      --sidebar-nav-link-color--active: #f0b429;
      --sidebar-name-color: #f0b429;
      --sidebar-name-font-size: 1.4rem;
      --sidebar-nav-link-font-weight--active: bold;
      --link-color: #f0b429;
      --link-color--hover: #ffd666;
      --heading-color: #e6edf3;
      --code-theme-background: #161b22;
      --code-inline-background: #1c2128;
      --code-inline-color: #f0b429;
      --blockquote-border-color: #f0b429;
      --cover-background-color: #0d1117;
      --search-result-heading-color: #f0b429;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .sidebar .app-name {
      text-align: center;
      padding: 16px 0 16px;
      margin: 0;
      line-height: 1;
    }

    .sidebar .app-name img {
      max-width: 140px;
      margin-bottom: 0;
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
    }

    .markdown-section table th {
      background-color: #161b22;
      color: #f0b429;
    }

    .markdown-section table td,
    .markdown-section table th {
      border: 1px solid #30363d;
      padding: 8px 12px;
    }

    .markdown-section table tr:nth-child(even) {
      background-color: #161b22;
    }

    .markdown-section img {
      border-radius: 8px;
      border: 1px solid #30363d;
    }

    .markdown-section h1 {
      border-bottom: 2px solid #f0b429;
      padding-bottom: 8px;
    }

    .markdown-section h2 {
      border-bottom: 1px solid #30363d;
      padding-bottom: 6px;
    }

    .markdown-section blockquote {
      background: #161b22;
      border-radius: 6px;
      padding: 12px 16px;
    }

    .search {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }

    .search .input-wrap {
      border-color: #30363d !important;
      background: #161b22 !important;
    }

    .search input {
      color: #c9d1d9 !important;
      background: #161b22 !important;
    }

    /* Cover page */
    .cover-main {
      color: #c9d1d9;
    }

    .cover-main a:last-child {
      background-color: #f0b429 !important;
      color: #0d1117 !important;
      border-radius: 6px;
      font-weight: bold;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0d1117;
    }
    ::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: '<img src="assets/logo.svg" alt="HiveBox" height="40">',
      repo: 'https://github.com/TetiAI/hivebox',
      homepage: 'README.md',
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      loadSidebar: false,
      coverpage: false,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3,
      },
      sidebar: [
        { title: 'Home', link: '/' },
        { title: 'Architecture', link: '/docs/architecture' },
        { title: 'API', link: '/docs/api' },
        { title: 'CLI', link: '/docs/cli' },
        { title: 'Deployment', link: '/docs/deployment' },
        { title: 'Security', link: '/docs/security' },
      ],
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!',
      },
    }
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <!-- Copy code button -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
